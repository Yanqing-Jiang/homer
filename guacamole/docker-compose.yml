version: '3.8'

services:
  guacd:
    image: guacamole/guacd:latest
    container_name: homer-guacd
    restart: always
    networks:
      - guacamole-net

  postgres:
    image: postgres:15-alpine
    container_name: homer-guac-db
    restart: always
    environment:
      POSTGRES_DB: guacamole_db
      POSTGRES_USER: guacamole_user
      POSTGRES_PASSWORD: ${GUAC_DB_PASSWORD:-changeme}
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./data:/var/lib/postgresql/data
    networks:
      - guacamole-net

  guacamole:
    image: guacamole/guacamole:latest
    container_name: homer-guacamole
    restart: always
    ports:
      - "8080:8080"
    environment:
      GUACD_HOSTNAME: guacd
      GUACD_PORT: "4822"
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_DATABASE: guacamole_db
      POSTGRESQL_USER: guacamole_user
      POSTGRESQL_PASSWORD: ${GUAC_DB_PASSWORD:-changeme}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - guacd
      - postgres
    networks:
      - guacamole-net

networks:
  guacamole-net:
    driver: bridge
