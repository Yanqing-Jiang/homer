name: Azure Blob Storage CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_SUPABASE_URL: https://muyfrblqagucgijljiir.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11eWZyYmxxYWd1Y2dpamxqaWlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4NDc3ODEsImV4cCI6MjA2OTQyMzc4MX0.D4CN8DMCjCxVnsceBEDOZOgOImA9H_bXR_MgvEic5do
          VITE_API_BASE: https://homer.jiangyanqing.com

      - name: Deploy to Azure Blob Storage
        run: |
          az storage blob upload-batch \
            --account-name amazonowendevstorage2 \
            --account-key "${{ secrets.AZURE_STORAGE_KEY }}" \
            --destination '$web' \
            --source web/build \
            --overwrite true
