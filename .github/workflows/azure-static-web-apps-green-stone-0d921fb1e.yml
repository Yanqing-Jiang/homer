name: Azure Blob Storage CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
        env:
          VITE_SUPABASE_URL: https://owendevstorage.icycoast-7ad83edf.westus2.azurecontainerapps.io/supabase
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11eWZyYmxxYWd1Y2dpamxqaWlyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM4NDc3ODEsImV4cCI6MjA2OTQyMzc4MX0.D4CN8DMCjCxVnsceBEDOZOgOImA9H_bXR_MgvEic5do
          VITE_API_BASE: https://owendevstorage.icycoast-7ad83edf.westus2.azurecontainerapps.io

      - name: Deploy to Azure Blob Storage
        env:
          ACCOUNT: amazonowendevstorage2
          AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
        run: |
          set -euo pipefail

          # 1. Upload
          az storage blob upload-batch \
            --account-name "$ACCOUNT" \
            --account-key  "$AZURE_STORAGE_KEY" \
            --destination  '$web' \
            --source       web/build \
            --overwrite true \
            --output none

          # 2. Set Cache-Control on every *.html so the entry point is
          #    always revalidated (content-hashed assets stay long-cache-safe).
          for html in $(cd web/build && find . -maxdepth 1 -type f -name '*.html' | sed 's|^\./||'); do
            az storage blob update \
              --account-name "$ACCOUNT" \
              --account-key  "$AZURE_STORAGE_KEY" \
              --container-name '$web' \
              --name "$html" \
              --content-cache "no-cache, must-revalidate" \
              --output none
          done

          # 3. Prune blobs no longer in the build (keep staticwebapp.config.json).
          ( cd web/build && find . -type f | sed 's|^\./||' ) | sort > /tmp/keep.txt
          az storage blob list --account-name "$ACCOUNT" --container-name '$web' \
            --account-key "$AZURE_STORAGE_KEY" -o tsv --query '[].name' | sort > /tmp/live.txt
          comm -23 /tmp/live.txt /tmp/keep.txt | grep -v '^staticwebapp.config.json$' > /tmp/stale.txt || true
          STALE=$(wc -l < /tmp/stale.txt | tr -d ' ')
          echo "Pruning $STALE stale blob(s)..."
          if [ "$STALE" -gt 0 ]; then
            xargs -I {} -P 16 az storage blob delete \
              --account-name "$ACCOUNT" \
              --account-key  "$AZURE_STORAGE_KEY" \
              --container-name '$web' \
              --name "{}" --output none < /tmp/stale.txt
          fi
