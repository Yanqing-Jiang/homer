# Homer daemon log rotation configuration
# Install: sudo cp ~/homer/config/newsyslog.d/homer.conf /etc/newsyslog.d/
#
# Format: logfile [owner:group] mode count size when flags
# - count: number of rotated files to keep (5)
# - size: rotate when file exceeds this size in KB (10240 = 10MB)
# - when: time-based rotation (* = disabled, size-based only)
# - flags: J = compress with bzip2

/Users/yj/homer/logs/stdout.log  yj:staff  644  5  10240  *  J
/Users/yj/homer/logs/stderr.log  yj:staff  644  5  10240  *  J
